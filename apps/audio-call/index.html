<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Audio Call</title>
<style>
  * { box-sizing: border-box; margin: 0; }
  body { font-family: system-ui, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; background: #111; color: #eee; }
  .container { text-align: center; max-width: 400px; width: 100%; padding: 2rem; }
  h1 { font-size: 1.4rem; margin-bottom: 1.5rem; }
  #status { color: #888; margin-bottom: 1.5rem; font-size: 0.9rem; }
  button { padding: 0.8rem 2rem; border: none; border-radius: 8px; font-size: 1rem; cursor: pointer; margin: 0.3rem; }
  button:disabled { opacity: 0.4; cursor: default; }
  #callBtn { background: #2a2; color: #fff; }
  #answerBtn { background: #28f; color: #fff; display: none; }
  #declineBtn { background: #c33; color: #fff; display: none; }
  #hangupBtn { background: #c33; color: #fff; display: none; }
  #muteBtn { background: #555; color: #fff; display: none; }
  .ringing { animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
</style>
</head>
<body>
<div class="container">
  <h1>Audio Call</h1>
  <p id="status">Connecting...</p>
  <div id="controls" style="display:none">
    <button id="callBtn" onclick="startCall()">Call</button>
    <button id="answerBtn" onclick="answerCall()">Answer</button>
    <button id="declineBtn" onclick="declineCall()">Decline</button>
    <button id="hangupBtn" onclick="hangup()">Hang up</button>
    <button id="muteBtn" onclick="toggleMute()">Mute</button>
  </div>
  <audio id="remoteAudio" autoplay></audio>
</div>
<script>
let es, pc, localStream, muted = false, myId = null;

const SERVER = "https://shooka.tail2fbae.ts.net";
const status = document.getElementById("status");
const controls = document.getElementById("controls");
const callBtn = document.getElementById("callBtn");
const answerBtn = document.getElementById("answerBtn");
const hangupBtn = document.getElementById("hangupBtn");
const muteBtn = document.getElementById("muteBtn");
const declineBtn = document.getElementById("declineBtn");
const remoteAudio = document.getElementById("remoteAudio");

function setStatus(msg) { status.textContent = msg; }

function send(data) {
  fetch(SERVER + "/signal", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ ...data, senderId: myId }),
  });
}

function connect() {
  es = new EventSource(SERVER + "/events");
  es.onopen = () => {
    setStatus("Connected - waiting for others");
    controls.style.display = "block";
  };
  es.onerror = () => setStatus("Connection failed");
  es.onmessage = (e) => handleSignal(JSON.parse(e.data));
}

connect();

async function getLocalStream() {
  if (!localStream) {
    localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
  }
  return localStream;
}

function createPeer() {
  pc = new RTCPeerConnection({ iceServers: [{ urls: "stun:stun.l.google.com:19302" }] });
  pc.onicecandidate = (e) => {
    if (e.candidate) send({ type: "ice", candidate: e.candidate });
  };
  pc.ontrack = (e) => { remoteAudio.srcObject = e.streams[0]; };
  pc.onconnectionstatechange = () => {
    if (pc.connectionState === "connected") {
      setStatus("In call");
      hangupBtn.style.display = "inline-block";
      muteBtn.style.display = "inline-block";
      callBtn.style.display = "none";
      answerBtn.style.display = "none";
    }
    if (pc.connectionState === "disconnected" || pc.connectionState === "failed") {
      setStatus("Call ended");
      cleanup();
    }
  };
  return pc;
}

async function startCall() {
  setStatus("Ringing...");
  callBtn.disabled = true;
  send({ type: "ring" });
}

async function answerCall() {
  answerBtn.style.display = "none";
  answerBtn.classList.remove("ringing");
  declineBtn.style.display = "none";
  setStatus("Connecting...");

  const stream = await getLocalStream();
  createPeer();
  stream.getTracks().forEach((t) => pc.addTrack(t, stream));

  send({ type: "answer-ring" });
}

async function handleSignal(msg) {
  switch (msg.type) {
    case "welcome":
      myId = msg.id;
      return;
    case "ring":
      setStatus("Incoming call...");
      answerBtn.style.display = "inline-block";
      answerBtn.classList.add("ringing");
      declineBtn.style.display = "inline-block";
      callBtn.style.display = "none";
      break;

    case "answer-ring":
      setStatus("Connecting...");
      const stream = await getLocalStream();
      createPeer();
      stream.getTracks().forEach((t) => pc.addTrack(t, stream));

      const offer = await pc.createOffer();
      await pc.setLocalDescription(offer);
      send({ type: "offer", sdp: pc.localDescription });
      break;

    case "offer":
      if (!pc) {
        const s = await getLocalStream();
        createPeer();
        s.getTracks().forEach((t) => pc.addTrack(t, s));
      }
      await pc.setRemoteDescription(new RTCSessionDescription(msg.sdp));
      const ans = await pc.createAnswer();
      await pc.setLocalDescription(ans);
      send({ type: "sdp-answer", sdp: pc.localDescription });
      break;

    case "sdp-answer":
      await pc.setRemoteDescription(new RTCSessionDescription(msg.sdp));
      break;

    case "ice":
      if (pc) await pc.addIceCandidate(new RTCIceCandidate(msg.candidate));
      break;

    case "hangup":
    case "peer-left":
      setStatus("Call ended");
      cleanup();
      break;
  }
}

function declineCall() {
  send({ type: "hangup" });
  answerBtn.style.display = "none";
  answerBtn.classList.remove("ringing");
  declineBtn.style.display = "none";
  callBtn.style.display = "inline-block";
  setStatus("Call declined");
}

function hangup() {
  send({ type: "hangup" });
  cleanup();
  setStatus("Call ended");
}

function toggleMute() {
  if (!localStream) return;
  muted = !muted;
  localStream.getAudioTracks().forEach((t) => (t.enabled = !muted));
  muteBtn.textContent = muted ? "Unmute" : "Mute";
}

function cleanup() {
  if (pc) { pc.close(); pc = null; }
  callBtn.style.display = "inline-block";
  callBtn.disabled = false;
  answerBtn.style.display = "none";
  answerBtn.classList.remove("ringing");
  declineBtn.style.display = "none";
  hangupBtn.style.display = "none";
  muteBtn.style.display = "none";
  remoteAudio.srcObject = null;
}
</script>
</body>
</html>
